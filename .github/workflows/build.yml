name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Generate launcher PNG icons
        run: |
          python3 - <<'EOF'
          import os, struct, zlib

          def make_png(size, bg=(17,17,17), fg=(255,68,68)):
              """Write a minimal valid PNG with a simple S-shaped icon."""
              pixels = []
              cx, cy = size // 2, size // 2
              r = size // 3
              for y in range(size):
                  row = []
                  for x in range(size):
                      dx, dy = x - cx, y - cy
                      # Top half arc (upper curve of S)
                      in_top = (dx*dx + (dy+r//2)*(dy+r//2)) < r*r and dy < 0
                      # Bottom half arc (lower curve of S)
                      in_bot = (dx*dx + (dy-r//2)*(dy-r//2)) < r*r and dy > 0
                      if in_top or in_bot:
                          row.extend(fg)
                      else:
                          row.extend(bg)
                  # PNG filter byte (0 = None) prepended to each row
                  pixels.append(bytes([0]) + bytes(row))

              def chunk(name, data):
                  c = name + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)

              sig   = b'\x89PNG\r\n\x1a\n'
              ihdr  = chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0))
              raw   = zlib.compress(b''.join(pixels))
              idat  = chunk(b'IDAT', raw)
              iend  = chunk(b'IEND', b'')
              return sig + ihdr + idat + iend

          sizes = {
              'mipmap-mdpi':   48,
              'mipmap-hdpi':   72,
              'mipmap-xhdpi':  96,
              'mipmap-xxhdpi': 144,
          }
          for folder, size in sizes.items():
              path = f'app/src/main/res/{folder}'
              os.makedirs(path, exist_ok=True)
              png = make_png(size)
              open(f'{path}/ic_launcher.png', 'wb').write(png)
              open(f'{path}/ic_launcher_round.png', 'wb').write(png)
          print("Icons generated OK")
          EOF

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SpyderMusicAuth-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
